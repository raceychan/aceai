name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run --group dev pytest -v
      - name: Build package
        run: uv build
      - name: Smoke test wheel install
        run: |
          wheel=$(ls -t dist/*.whl | head -n1)
          uv venv --python ${{ env.PYTHON_VERSION }} .wheel-smoke
          uv pip install --python .wheel-smoke/bin/python "$wheel"
          .wheel-smoke/bin/aceai --help
          if .wheel-smoke/bin/aceai > smoke.out 2> smoke.err; then
            echo "aceai unexpectedly launched without the tui extra"
            exit 1
          fi
          grep -F "pip install --upgrade 'aceai[tui]'" smoke.err
          uv venv --python ${{ env.PYTHON_VERSION }} .wheel-smoke-tui
          uv pip install --python .wheel-smoke-tui/bin/python "aceai[tui] @ file://$PWD/$wheel"
          .wheel-smoke-tui/bin/aceai --help

  publish:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Install dependencies
        run: uv sync --group dev
      - name: Verify tag merged into master
        run: |
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/master"; then
            echo "Tag ${GITHUB_REF_NAME} is not merged into master. Release aborted."
            exit 1
          fi
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: uv run --group dev twine upload dist/* --skip-existing
